        ];

        const itemsPerPage = 12; // 사진이 포함되어 세로로 길어지므로 12개씩 보여줍니다.
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = sermonData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('sermon-list-pc');
            const mobileContainer = document.getElementById('sermon-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                
                // [태그] 분리하여 파란색으로 예쁘게 칠하기
                let tag = "";
                let mainTitle = item.title;
                const tagMatch = item.title.match(/^\[(.*?)\]/);
                
                if (tagMatch) {
                    tag = tagMatch[1];
                    mainTitle = item.title.replace(/^\[.*?\]\s*/, '');
                } else {
                    tag = "주일오후예배"; // 기본 태그
                }

                // 1. PC 테이블 렌더링
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group h-24';
                tr.onclick = () => { if(item.link !== '#') window.open(item.link, '_blank'); };
                
                tr.innerHTML = `
                    <td class="py-3 text-gray-400 font-medium">${item.id}</td>
                    <td class="py-3 px-2">
                        <!-- 마법의 썸네일 박스 (그림 없이 CSS로 그림 느낌 내기) -->
                        <div class="thumb-bg w-full h-16 rounded overflow-hidden flex flex-col justify-center items-center shadow-sm">
                            <i class="fas fa-cross text-white/80 text-xs mb-0.5 relative z-10"></i>
                            <span class="text-white font-extrabold text-[10px] sm:text-xs relative z-10 px-1 truncate w-full text-center tracking-tight">${tag}</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-left">
                        ${tagMatch ? `<span class="text-[#3b82f6] font-bold text-[13px] block mb-0.5">[${tag}]</span>` : ''}
                        <span class="font-bold text-gray-800 text-[15px] group-hover:text-blue-600 transition truncate block max-w-full">${mainTitle}</span>
                    </td>
                    <td class="py-3 text-[13px] md:text-sm text-gray-600">${item.text}</td>
                    <td class="py-3 text-gray-800 font-medium text-[13px] md:text-sm">${item.preacher}</td>
                    <td class="py-3 text-[13px] md:text-sm text-gray-500">${item.date}</td>
                `;
                pcTbody.appendChild(tr);

                // 2. 모바일 리스트 렌더링
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3 hover:bg-gray-50 transition cursor-pointer items-center px-2';
                mDiv.onclick = () => { if(item.link !== '#') window.open(item.link, '_blank'); };
                
                mDiv.innerHTML = `
                    <div class="w-10 text-center text-gray-400 text-sm shrink-0">${item.id}</div>
                    <div class="w-24 shrink-0 mx-2">
                        <div class="thumb-bg w-full h-16 rounded overflow-hidden flex flex-col justify-center items-center shadow-sm">
                            <i class="fas fa-cross text-white/80 text-[10px] mb-0.5 relative z-10"></i>
                            <span class="text-white font-extrabold text-[10px] relative z-10 px-1 truncate w-full text-center leading-tight">${tag}</span>
                        </div>
                    </div>
                    <div class="flex-1 pr-2 relative overflow-hidden">
                        <div class="text-gray-900 text-[14px] font-bold mb-1 truncate leading-snug">${mainTitle}</div>
                        <div class="text-gray-500 text-[12px] flex flex-wrap gap-x-2 gap-y-0.5 mb-0.5 leading-tight">
                            <span class="truncate max-w-full">${item.text}</span>
                            <span class="text-gray-700 font-medium">${item.preacher}</span>
                        </div>
                        <div class="text-gray-400 text-[11px]">${item.date}</div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(sermonData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 400, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
