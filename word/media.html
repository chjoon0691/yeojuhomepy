        <!-- Right Content Area -->

                    </select>
                    <input type="text" class="px-3 py-1.5 text-sm md:text-base w-32 md:w-48 focus:outline-none" placeholder="검색어 입력">
                    <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 text-sm md:text-base border-l border-gray-300 transition">

                    </button>

            </div>

            <table class="hidden md:table w-full text-center text-sm md:text-base border-t-2 border-gray-800 table-fixed">
                <colgroup>
                    <col class="w-[10%]">
                    <col class="w-[60%]">
                    <col class="w-[20%]">

                </colgroup>
                <thead class="bg-gray-50 text-gray-700 font-bold border-b border-gray-300">

                        <th class="py-3 px-2">번호</th>

                <tbody id="media-list-pc" class="text-gray-600"></tbody>
            </table>

            <div id="media-list-mobile" class="md:hidden block w-full border-t-2 border-gray-800"></div>

    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->
    <div id="common-footer"></div>
    <div id="common-sitemap"></div>

    <script>
        // 보조 메뉴 토글
        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        const mediaData = [
            { id: 17, title: "2024 그리스. 로마 성지순례", date: "2024-05-02", link: "#" },
            { id: 16, title: "월드비전 합창단 초청 공연", date: "2022-07-17", link: "#" },
            { id: 15, title: "7월 17일 월드비전 초청 예배", date: "2022-07-08", link: "#" },
            { id: 14, title: "7월 17일 월드비전 초청 예배", date: "2022-07-08", link: "#" },
            { id: 13, title: "여주 푸르지오 아파트 입주", date: "2022-01-02", link: "#" },
            { id: 12, title: "키르키즈스탄(기아대책) 선교", date: "2020-10-13", link: "#" },
            { id: 11, title: "2020년도 중등부 동계수련회", date: "2020-02-21", link: "#" },
            { id: 10, title: "2020 고등부동계수련회", date: "2020-02-13", link: "#" },
            { id: 9, title: "2019교육부서 여름성경학교", date: "2019-08-04", link: "#" },
            { id: 8, title: "2019 키르키즈스탄 단기선교", date: "2019-08-04", link: "#" },
            { id: 7, title: "온가족예배 신앙의계승 영상", date: "2019-05-26", link: "#" },
            { id: 6, title: "주님 나라 이루소서", date: "2019-04-21", link: "#" },
            { id: 5, title: "대만 2019 중고등부 비전트립", date: "2019-02-03", link: "#" },
            { id: 4, title: "2018년 여주교회 발자취 영상", date: "2019-01-20", link: "#" },
            { id: 3, title: "말씀과 그림 소장전", date: "2018-11-21", link: "#" }
        ];

        const itemsPerPage = 15;
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = mediaData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('media-list-pc');
            const mobileContainer = document.getElementById('media-list-mobile');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer';
                if(item.link !== '#') {
                    tr.onclick = () => window.open(item.link, '_blank');
                }
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800">${item.title}</td>
                    <td class="py-4 text-sm text-gray-500">${item.date}</td>
                    <td class="py-4">
                        ${item.link !== '#' 
                            ? `<a href="${item.link}" target="_blank" class="bg-[#5c5c5c] hover:bg-[#1b315b] text-white rounded w-8 h-6 flex items-center justify-center mx-auto transition"><i class="fas fa-tv text-xs"></i></a>` 
                            : `<button class="bg-[#e5e7eb] text-gray-400 cursor-not-allowed rounded w-8 h-6 flex items-center justify-center mx-auto"><i class="fas fa-tv text-xs"></i></button>`}
                    </td>
                `;
                pcTbody.appendChild(tr);

                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3 items-center hover:bg-gray-50 transition cursor-pointer';
                if(item.link !== '#') {
                    mDiv.onclick = () => window.open(item.link, '_blank');
                }
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate">${item.title}</div>
                        <div class="text-gray-400 text-[13px]">${item.date}</div>
                        ${item.link !== '#' 
                            ? `<div class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-400"><i class="fas fa-tv text-lg"></i></div>` 
                            : `<div class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-200"><i class="fas fa-tv text-lg"></i></div>`}
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(mediaData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => { e.preventDefault(); currentPage = i; renderTable(currentPage); window.scrollTo({top: 400, behavior: 'smooth'}); };
                paginationContainer.appendChild(a);
            }
        }

        document.addEventListener('DOMContentLoaded', () => renderTable(currentPage));
    </script>
