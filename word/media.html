    <script>
        const mediaData = [
            { id: 17, title: "2024 그리스. 로마 성지순례", date: "2024-05-02", link: "#" },
            { id: 16, title: "월드비전 합창단 초청 공연", date: "2022-07-17", link: "#" },
            { id: 15, title: "7월 17일 월드비전 초청 예배", date: "2022-07-08", link: "#" },
            { id: 14, title: "7월 17일 월드비전 초청 예배", date: "2022-07-08", link: "#" },
            { id: 13, title: "여주 푸르지오 아파트 입주", date: "2022-01-02", link: "#" },
            { id: 12, title: "키르키즈스탄(기아대책) 선교", date: "2020-10-13", link: "#" },
            { id: 11, title: "2020년도 중등부 동계수련회", date: "2020-02-21", link: "#" },
            { id: 10, title: "2020 고등부동계수련회", date: "2020-02-13", link: "#" },
            { id: 9, title: "2019교육부서 여름성경학교", date: "2019-08-04", link: "#" },
            { id: 8, title: "2019 키르키즈스탄 단기선교", date: "2019-08-04", link: "#" },
            { id: 7, title: "온가족예배 신앙의계승 영상", date: "2019-05-26", link: "#" },
            { id: 6, title: "주님 나라 이루소서", date: "2019-04-21", link: "#" },
            { id: 5, title: "대만 2019 중고등부 비전트립", date: "2019-02-03", link: "#" },
            { id: 4, title: "2018년 여주교회 발자취 영상", date: "2019-01-20", link: "#" },
            { id: 3, title: "말씀과 그림 소장전", date: "2018-11-21", link: "#" }
        ];

        const itemsPerPage = 15;
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = mediaData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('media-list-pc');
            const mobileContainer = document.getElementById('media-list-mobile');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition';
                tr.innerHTML = `
                    <td class="py-4">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800">${item.title}</td>
                    <td class="py-4 text-gray-500">${item.date}</td>
                    <td class="py-4"><a href="${item.link}" class="text-gray-500 hover:text-blue-600"><i class="fas fa-tv"></i></a></td>
                `;
                pcTbody.appendChild(tr);

                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3 items-center';
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm">${item.id}</div>
                    <div class="flex-1 font-bold text-gray-800">${item.title}</div>
                    <div class="w-12 text-center"><a href="${item.link}" class="text-gray-400"><i class="fas fa-tv"></i></a></div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(mediaData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => { e.preventDefault(); currentPage = i; renderTable(currentPage); window.scrollTo({top: 400, behavior: 'smooth'}); };
                paginationContainer.appendChild(a);
            }
        }

        document.addEventListener('DOMContentLoaded', () => renderTable(currentPage));
    </script>
