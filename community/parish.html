<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교구 - 여주성결교회</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; overflow-x: hidden; }
    </style>
</head>
<body class="text-gray-800">

    <!-- 마법의 파일 연결 1: 공통 상단 헤더 -->
    <div id="common-header"></div>

    <!-- 상단 배너 -->
    <section class="bg-[#102242] py-12 md:py-20 text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3')] bg-cover bg-center opacity-30 mix-blend-luminosity"></div>
        <div class="relative z-10">
            <h2 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight mb-2">공동체</h2>
            <p class="text-blue-200 text-sm md:text-base">Community</p>
        </div>
    </section>

    <!-- Main Content Layout -->
    <div class="max-w-7xl mx-auto px-4 py-12 md:py-20 flex flex-col md:flex-row gap-10">
        
        <!-- 좌측 사이드바 -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-[#6b8cba] text-white text-center py-4 text-xl font-bold rounded-t-lg">공동체</div>
            <ul class="border border-t-0 border-gray-200 flex flex-col">
                <li><a href="parish.html" class="flex justify-between items-center px-5 py-3 text-[#3b82f6] font-bold bg-gray-50 hover:bg-gray-100 transition border-b border-gray-200">교구 <i class="fas fa-chevron-right text-xs"></i></a></li>
                <li><a href="organization.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">기관</a></li>
                <li><a href="training.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">양육&훈련</a></li>
                <li><a href="senior.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">청춘대학</a></li>
                <li><a href="company.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition rounded-b-lg">성도기업</a></li>
            </ul>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1">
            <div class="w-full bg-[#1b315b] rounded-xl h-24 md:h-32 flex flex-col justify-center items-center text-white shadow-md relative overflow-hidden mb-12">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3')] bg-cover bg-center opacity-30 mix-blend-overlay"></div>
                <h3 class="text-2xl md:text-3xl font-extrabold relative z-10 tracking-tight">교구</h3>
            </div>

            <!-- 교구 조직도 테이블 -->
            <div class="mb-10">
                <div class="flex items-center gap-2 mb-4">
                    <i class="far fa-dot-circle text-[#6597a8] text-xl"></i>
                    <h3 class="text-2xl font-bold text-gray-800">교구 조직</h3>
                </div>
                
                <!-- 모바일에서도 잘 보이게 overflow-x-auto 적용 -->
                <div class="border border-gray-200 shadow-sm rounded-lg overflow-x-auto bg-white">
                    <table class="w-full text-center text-sm md:text-base whitespace-nowrap">
                        <thead class="bg-[#1b315b] text-white">
                            <tr>
                                <th class="py-3.5 px-4 font-bold border-r border-white/20 w-1/3">교구</th>
                                <th class="py-3.5 px-4 font-bold border-r border-white/20 w-1/3">교구장로</th>

                            </tr>
                        </thead>
                        <tbody class="text-gray-700">
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">1교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">박광섭장로</td>
                                <td class="py-3.5 px-4">김명숙C권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">2교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">김기호장로</td>
                                <td class="py-3.5 px-4">이종숙권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">3교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">권재윤장로</td>
                                <td class="py-3.5 px-4">조선옥권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">4교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">임성선장로</td>
                                <td class="py-3.5 px-4">유옥자권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">5교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">황덕수장로</td>
                                <td class="py-3.5 px-4">윤석경권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">6교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">이태수장로</td>
                                <td class="py-3.5 px-4">손정희권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">7교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">이종수장로</td>
                                <td class="py-3.5 px-4">김경희H집사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">8교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">노성호장로</td>
                                <td class="py-3.5 px-4">염옥주권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">9교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">이훈희장로</td>
                                <td class="py-3.5 px-4">곽성란집사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">10교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">정완길장로</td>
                                <td class="py-3.5 px-4">김현숙C권사</td>
                            </tr>
                            <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">11교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">류근식장로</td>
                                <td class="py-3.5 px-4">김경선권사</td>
                            </tr>
                            <tr class="hover:bg-gray-50 transition">
                                <td class="py-3.5 px-4 font-bold text-gray-900 border-r border-gray-200">12교구</td>
                                <td class="py-3.5 px-4 border-r border-gray-200">곽동석장로</td>
                                <td class="py-3.5 px-4">박선분권사</td>
                            </tr>
                        </tbody>
                    </table>

            </div>

    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->
    <div id="common-footer"></div>
    <div id="common-sitemap"></div>

    <script>const ROOT_PATH = "../";</script>
    <script src="../js/common.js"></script>
</body>
</html>
