<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성도기업 - 여주성결교회</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        
        /* 페이지네이션 스타일 */
        .page-link {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border: 1px solid #e5e7eb; color: #4b5563;
            font-size: 14px; transition: all 0.2s; margin: 0 2px;
        }
        .page-link:hover { background-color: #f3f4f6; color: #1b315b; }
        .page-link.active { border-color: #1b315b; color: #1b315b; font-weight: bold; }
    </style>
</head>
<body class="text-gray-800">

    <!-- 마법의 파일 연결 1: 공통 상단 헤더 -->
    <div id="common-header"></div>

    <!-- 상단 배너 -->
    <section class="bg-[#102242] py-12 md:py-20 text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3')] bg-cover bg-center opacity-30 mix-blend-luminosity"></div>
        <div class="relative z-10">
            <h2 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight mb-2">공동체</h2>
            <p class="text-blue-200 text-sm md:text-base">Community</p>
        </div>
    </section>

    <!-- Main Content Layout -->
    <div class="max-w-7xl mx-auto px-4 py-12 md:py-20 flex flex-col md:flex-row gap-10 relative">
        
        <!-- 좌측 사이드바 -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-[#6b8cba] text-white text-center py-4 text-xl font-bold rounded-t-lg">공동체</div>
            <ul class="border border-t-0 border-gray-200 flex flex-col">
                <li><a href="parish.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">교구</a></li>
                <li><a href="organization.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">기관</a></li>
                <li><a href="training.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">양육&훈련</a></li>
                <li><a href="senior.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">청춘대학</a></li>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1">
            <div class="w-full bg-[#1b315b] rounded-xl h-32 md:h-48 flex flex-col justify-center items-center text-white shadow-md relative overflow-hidden mb-10">

            </div>

            <!-- 검색바 -->
            <div class="flex justify-end mb-4 border-b border-gray-200 pb-4">
                <div class="flex border border-gray-300 rounded shadow-sm overflow-hidden bg-white">
                    <select class="px-3 py-1.5 text-sm md:text-base border-r border-gray-300 text-gray-700 focus:outline-none bg-gray-50 cursor-pointer">
                        <option>제목</option>
                        <option>업종</option>
                        <option>성도명</option>
                    </select>
                    <input type="text" class="px-3 py-1.5 text-sm md:text-base w-32 md:w-48 focus:outline-none" placeholder="검색어 입력">
                    <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-1.5 text-sm md:text-base border-l border-gray-300 transition">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <!-- PC Version Table -->
            <table class="hidden md:table w-full text-center text-sm md:text-base border-t-2 border-gray-800 table-fixed">
                <colgroup>
                    <col class="w-[10%]">
                    <col class="w-[25%]">
                    <col class="w-[45%]">
                    <col class="w-[20%]">
                </colgroup>
                <thead class="bg-gray-50 text-gray-700 font-bold border-b border-gray-300">
                    <tr>
                        <th class="py-3 px-2">번호</th>
                        <th class="py-3 px-2">구분(업종)</th>
                        <th class="py-3 px-4 text-left">상호명(제목)</th>
                        <th class="py-3 px-2">성도</th>
                    </tr>
                </thead>
                <tbody id="company-list-pc" class="text-gray-600"></tbody>
            </table>

            <!-- Mobile Version List -->
            <div class="md:hidden block w-full border-t-2 border-gray-800">
                <div class="flex bg-gray-50 text-gray-700 font-bold border-b border-gray-300 py-3 text-sm">
                    <div class="w-12 text-center">번호</div>
                    <div class="flex-1 pl-2">상호명 / 성도</div>
                </div>
                <div id="company-list-mobile-body"></div>
            </div>

            <!-- 페이지네이션 -->
            <div id="pagination" class="flex justify-center items-center mt-8 mb-6 flex-wrap gap-y-2"></div>
        </main>
    </div>

    <div id="common-footer"></div>
    <div id="common-sitemap"></div>
    
    <!-- 모달 -->
    <div id="company-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="relative w-full max-w-3xl bg-white shadow-2xl z-10 flex flex-col max-h-[90vh] rounded-xl overflow-hidden">
            <div class="bg-gray-800 text-white px-5 py-4 flex justify-between items-center shrink-0">
                <h2 id="modal-header-title" class="text-lg md:text-xl font-bold truncate">[업종] 상호명</h2>
                <button onclick="closeModal()" class="text-gray-300 hover:text-white transition-colors ml-4 focus:outline-none"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div class="p-6 md:p-8 overflow-y-auto flex-1 bg-gray-50">
                <div class="bg-white p-5 md:p-6 rounded-lg border border-gray-200 shadow-sm mb-6">
                    <div class="space-y-3 text-[15px] md:text-base text-gray-700">
                        <div class="flex items-start"><span class="font-bold w-20 shrink-0 text-gray-900">상호명:</span><span id="modal-name"></span></div>
                        <div class="flex items-start"><span class="font-bold w-20 shrink-0 text-gray-900">위치:</span><span id="modal-location"></span></div>
                        <div class="flex items-start"><span class="font-bold w-20 shrink-0 text-gray-900">전화:</span><span id="modal-phone"></span></div>
                        <div class="flex items-start pt-3 mt-3 border-t border-gray-100"><span class="font-bold w-20 shrink-0 text-gray-900">성도:</span><span id="modal-owner" class="text-blue-700 font-medium"></span></div>
                    </div>
                </div>
                <div class="rounded-lg overflow-hidden border border-gray-200 shadow-sm bg-white p-2"><img id="modal-image" src="" alt="매장 사진" class="w-full h-auto object-cover rounded"></div>
            </div>
        </div>
    </div>

    <script>
        const companyData = [
            { id: 43, category: "이미용, 건강, 스포츠", name: "퓨어벨로", description: "(눈썹 관리, 눈썹 펌 전문)", owner: "신율 청년", owner_detail: "(신현호 집사, 이은은 집사 차녀)", location: "오학초등학교 후문쪽", phone: "010-9884-9150", image_url: "https://images.unsplash.com/photo-1522337660859-02fbefca4702?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 42, category: "생산, 제작, 가공", name: "장 봐주는 언니 2호점", description: "", owner: "관리자", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1542838132-92c53300491e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 41, category: "음식점, 분식, 커피", name: "던킨 여주 오학점", description: "", owner: "성도", owner_detail: "", location: "오학동", phone: "-", image_url: "https://images.unsplash.com/photo-1551024601-bec78aea704b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 40, category: "자동차", name: "하이테크정비센터(자동차)", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1613214149922-f1809c99b414?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 39, category: "부동산, 관광", name: "여주 이편한 공인중개사", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1560518846-cebc81520052?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 38, category: "생산, 제작, 가공", name: "장 봐주는 언니", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1542838132-92c53300491e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 37, category: "의류, 수선, 세탁", name: "수선나라", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1528325983731-0177dd3f9ea8?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 36, category: "자동차", name: "현대자동차", description: "대리점", owner: "이종필 성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1562145887-f823f66673eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 35, category: "자동차", name: "현대자동차", description: "대리점", owner: "곽봉철 집사", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1562145887-f823f66673eb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 34, category: "건설, 설비, 조경", name: "KS 건설(주)", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 33, category: "음식점, 분식, 커피", name: "김밥나라", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 32, category: "생산, 제작, 가공", name: "우리마트", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1578916171728-46686eac8d58?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 31, category: "음식점, 분식, 커피", name: "앵두나무집", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 30, category: "자동차", name: "대황부품센타", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1486262715619-670810a074e0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 29, category: "음식점, 분식, 커피", name: "영구스피자", description: "", owner: "성도", owner_detail: "", location: "여주시", phone: "-", image_url: "https://images.unsplash.com/photo-1513104890d38-7c7f5845cb65?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
        ];

        const itemsPerPage = 15; 
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = companyData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('company-list-pc');
            const mobileContainer = document.getElementById('company-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 text-gray-500 text-sm truncate">${item.category}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-blue-600 transition flex items-center gap-2">
                        <span class="truncate">${item.name}</span>
                        <i class="far fa-image text-gray-400 text-xs"></i>
                    </td>
                    <td class="py-4 text-sm font-medium text-gray-700">${item.owner}</td>
                `;
                pcTbody.appendChild(tr);

                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3 hover:bg-gray-50 transition cursor-pointer';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-12 text-center text-gray-400 text-sm pt-0.5">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-500 text-[12px] mb-0.5">${item.category}</div>
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 flex items-center gap-1.5">
                            <span class="truncate max-w-[200px]">${item.name}</span>
                            <i class="far fa-image text-gray-400 text-[10px]"></i>
                        </div>
                        <div class="text-blue-600 text-[13px] font-medium">${item.owner}</div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(companyData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        function openModal(id) {
            const company = companyData.find(c => c.id === id);
            if(!company) return;
            document.getElementById('modal-header-title').textContent = `[${company.category}] ${company.name}`;
            document.getElementById('modal-name').textContent = `${company.name} ${company.description}`;
            document.getElementById('modal-location').textContent = company.location;
            document.getElementById('modal-phone').textContent = company.phone;
            const ownerText = company.owner_detail ? `${company.owner} ${company.owner_detail}` : company.owner;
            document.getElementById('modal-owner').textContent = ownerText;
            document.getElementById('modal-image').src = company.image_url;
            const modal = document.getElementById('company-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('company-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
    <script>const ROOT_PATH = "../";</script>
    <script src="../js/common.js"></script>
</body>
</html>
