        <aside class="hidden md:block w-64 flex-shrink-0">

                <li><a href="children.html" class="flex justify-between items-center px-5 py-3 text-[#3b82f6] font-bold bg-gray-50 hover:bg-gray-100 transition border-b border-gray-200">유년부 <i class="fas fa-chevron-right text-xs"></i></a></li>

                        <p class="text-sm font-light">본관 3층 물댄동산</p>

                    <div class="border-t border-gray-600/50 pt-6">
