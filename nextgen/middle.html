<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중등부 - 여주성결교회</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        /* 중등부 타이틀용 손글씨 폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        
        /* 중등부 전용 울타리 배경 패턴 */
        .fence-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='60' viewBox='0 0 40 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20 L20 0 L30 20 L30 60 L10 60 Z' fill='%23ffffff' opacity='0.9'/%3E%3Cpath d='M0 40 L40 40' stroke='%23ffffff' stroke-width='6' opacity='0.9'/%3E%3C/svg%3E");
            background-repeat: repeat-x;
            background-position: bottom;
            background-size: 40px 60px;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- 마법의 파일 연결 1: 공통 상단 헤더 -->
    <div id="common-header"></div>

    <section class="bg-[#102242] py-12 md:py-20 text-center relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3')] bg-cover bg-center opacity-30 mix-blend-luminosity"></div>
        <div class="relative z-10">
            <h2 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight mb-2">다음세대</h2>
            <p class="text-blue-200 text-sm md:text-base">Next Generation</p>
        </div>
    </section>

    <!-- Main Content Layout -->
    <div class="max-w-7xl mx-auto px-4 py-12 md:py-20 flex flex-col md:flex-row gap-10">
        
        <!-- 좌측 사이드바 -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-[#6b8cba] text-white text-center py-4 text-xl font-bold rounded-t-lg">다음세대</div>
            <ul class="border border-t-0 border-gray-200 flex flex-col">
                <li><a href="infant.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">영아부</a></li>
                <li><a href="kindergarten.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">유치부</a></li>
                <li><a href="children.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">유년부</a></li>
                <li><a href="elementary.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">초등부</a></li>
                <li><a href="awana.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">어와나</a></li>
                <li><a href="middle.html" class="flex justify-between items-center px-5 py-3 text-[#3b82f6] font-bold bg-gray-50 transition border-b border-gray-200">중등부 <i class="fas fa-chevron-right text-xs"></i></a></li>
                <li><a href="high.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">고등부</a></li>
                <li><a href="youth.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition rounded-b-lg">청년사역위원회</a></li>
            </ul>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1">
            
            <!-- 중등부 특화 디자인 박스 -->
            <div class="w-full bg-[#f1f6f4] rounded-2xl overflow-hidden shadow-md border border-[#d1e5df]">
                
                <!-- 상단 민트색 헤더 및 사진 영역 -->
                <div class="bg-[#8cc3b2] pt-12 md:pt-16 pb-20 md:pb-24 flex flex-col items-center relative z-10">
                    <h2 class="text-4xl md:text-6xl text-[#fdf5a9] tracking-wide mb-6 md:mb-10 text-center px-4" style="font-family: 'Nanum Pen Script', cursive; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">
                        모이는 중등부! 기대 되는 중등부!
                    </h2>
                    
                    <div class="w-11/12 max-w-3xl border-[6px] border-white shadow-xl relative z-20 bg-white">
                        <img src="https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/nextgen/images/%EC%A4%91%EB%93%B1%EB%B6%80.jpg" alt="중등부 사진" class="w-full h-56 md:h-96 object-cover">
                    </div>

                    <!-- 울타리 배경 효과 (절대 위치로 하단에 배치) -->
                    <div class="absolute bottom-0 left-0 w-full h-16 fence-bg z-0 opacity-90"></div>
                </div>

                <!-- 하단 정보 리스트 영역 -->
                <div class="bg-[#f1f6f4] px-4 md:px-12 py-10 md:py-16 flex flex-col items-center gap-5 relative z-20 -mt-2">
                    
                    <div class="flex flex-col md:flex-row items-center md:items-start gap-3 md:gap-6 w-full max-w-2xl bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:-translate-y-1 transition duration-300">
                        <div class="bg-[#65b29c] text-white px-5 py-2 font-bold w-28 text-center shrink-0 shadow-sm md:mt-0.5">주제성구</div>
                        <p class="text-gray-700 text-[15px] md:text-lg leading-relaxed text-center md:text-left pt-1 break-keep">그들이 사도의 가르침을 받아 서로 교제하고 떡을 떼며 오로지 기도하기를 힘쓰니라(행 2:42)</p>
                    </div>

                    <div class="flex flex-col md:flex-row items-center md:items-start gap-3 md:gap-6 w-full max-w-2xl bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:-translate-y-1 transition duration-300">
                        <div class="bg-[#65b29c] text-white px-5 py-2 font-bold w-28 text-center shrink-0 shadow-sm md:mt-0.5">예배안내</div>
                        <p class="text-gray-700 text-[15px] md:text-lg leading-relaxed text-center md:text-left pt-1">주일 오전 11시 / 교육관 1층 중등부실</p>
                    </div>

                    <div class="flex flex-col md:flex-row items-center md:items-start gap-3 md:gap-6 w-full max-w-2xl bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:-translate-y-1 transition duration-300">
                        <div class="bg-[#65b29c] text-white px-5 py-2 font-bold w-28 text-center shrink-0 shadow-sm md:mt-0.5">지도</div>
                        <p class="text-gray-700 text-[15px] md:text-lg leading-relaxed text-center md:text-left pt-1">교역자 : 김대희 목사 / 부장교사 : 이인식 집사</p>
                    </div>

                </div>

            </div>

        </main>
    </div>

    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->
    <div id="common-footer"></div>
    <div id="common-sitemap"></div>

    <script>const ROOT_PATH = "../";</script>
    <script src="../js/common.js"></script>
</body>
</html>
