<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>유치부 - 여주성결교회</title>
    <!-- Tailwind CSS -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <!-- 좌측 사이드바 -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-[#6b8cba] text-white text-center py-4 text-xl font-bold rounded-t-lg">다음세대</div>
            <ul class="border border-t-0 border-gray-200 flex flex-col">
                <li><a href="infant.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">영아부</a></li>
                <li><a href="kindergarten.html" class="flex justify-between items-center px-5 py-3 text-[#3b82f6] font-bold bg-gray-50 transition border-b border-gray-200">유치부 <i class="fas fa-chevron-right text-xs"></i></a></li>
                <li><a href="children.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">유년부</a></li>
                <li><a href="elementary.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">초등부</a></li>
                <li><a href="awana.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">어와나</a></li>
                <li><a href="middle.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">중등부</a></li>
                <li><a href="high.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition border-b border-gray-200">고등부</a></li>
                <li><a href="youth.html" class="flex justify-between items-center px-5 py-3 text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition rounded-b-lg">청년사역위원회</a></li>
            </ul>
        </aside>

        <!-- 메인 콘텐츠 영역 -->
        <main class="flex-1">
            <div class="text-center mb-8 md:mb-10">
                <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-3 tracking-tight">유치부</h2>
                <p class="text-gray-600 font-medium md:text-lg">기도하는 우리반, 기대되는 유치부</p>
            </div>

            <!-- 사진 및 회색 박스 영역 -->
            <div class="w-full bg-[#f4f4f4] rounded-2xl overflow-hidden border border-gray-200 shadow-sm mb-12">
                <img src="https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/nextgen/images/%EC%9C%A0%EC%B9%98%EB%B6%80.jpg" alt="유치부 사진" class="w-full h-56 md:h-96 object-cover border-b border-gray-200">
                
                <div class="p-6 md:p-12 max-w-4xl mx-auto">

                           <div class="text-gray-600 pl-4 border-l border-gray-200 text-sm md:text-base">주일 오전 11시</div>

                           <div class="w-12 md:w-16 flex justify-center text-gray-400 shrink-0"><i class="fas fa-map-marker-alt text-xl md:text-2xl"></i></div>
                           <div class="font-bold text-gray-800 w-16 md:w-20 shrink-0 text-sm md:text-base">장소</div>
                           <div class="text-gray-600 pl-4 border-l border-gray-200 text-sm md:text-base">본관 1층 유치부실</div>
                        </div>
                        <div class="p-5 md:p-6 flex items-center">
                           <div class="w-12 md:w-16 flex justify-center text-gray-400 shrink-0"><i class="fas fa-user-friends text-lg md:text-xl"></i></div>
                           <div class="font-bold text-gray-800 w-16 md:w-20 shrink-0 text-sm md:text-base">지도</div>
                           <div class="text-gray-600 pl-4 border-l border-gray-200 text-sm md:text-base leading-relaxed">교역자: 민현정 전도사 / 부장교사: 신영미 집사</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 주제성구 -->
            <div class="px-4 md:px-6">
                <h3 class="font-extrabold text-xl md:text-2xl text-gray-900 mb-3 tracking-tight">주제성구</h3>
                <p class="text-gray-800 font-bold mb-1.5 md:text-lg">사도행전 2장 42절</p>
                <p class="text-gray-600 text-sm md:text-base break-keep leading-relaxed">
                    그들이 사도의 가르침을 받아 서로 교제하고 떡을 떼며 오로지 기도하기를 힘쓰니라
                </p>
            </div>
        </main>

    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->
