        // 데이터 파싱
        const bulletinData = rawText.trim().split('\n')
            .filter(line => line.trim() !== '')
            .map(line => {
                const parts = line.split('|');
                return {
                    id: parseInt(parts[0].trim()),
                    title: parts[1].trim(),
                    date: parts[2].trim()
                };
            }).filter(item => !isNaN(item.id));

        // 총 주보 수 표시
        document.getElementById('total-count').textContent = bulletinData.length;

        // 2. 깃허브 사진 저장소 기본 주소
        const baseURL = "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/news/images/jubo/";

        const itemsPerPage = 15; // 한 페이지당 15개씩 출력
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = bulletinData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('bulletin-list-pc');
            const mobileContainer = document.getElementById('bulletin-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                // PC Version
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition">
                        <span class="truncate max-w-full">${item.title}</span>
                    </td>
                    <td class="py-4 text-sm font-medium text-gray-500">${item.date}</td>
                    <td class="py-4">
                        <button class="bg-[#5c5c5c] group-hover:bg-[#1b315b] text-white rounded w-8 h-6 flex items-center justify-center mx-auto transition shadow-sm">
                            <i class="far fa-file-image text-xs"></i>
                        </button>
                    </td>
                `;
                pcTbody.appendChild(tr);

                // Mobile Version
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center px-2';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-14 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate pr-8">${item.title}</div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                        <div class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-400">
                            <i class="far fa-file-image text-lg"></i>
                        </div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(bulletinData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            if (totalPages === 0) return;

            // 한 번에 보여줄 페이지 번호 개수 (10개씩)
            const pagesPerGroup = 10;
            const currentGroup = Math.ceil(currentPage / pagesPerGroup);
            let startPage = (currentGroup - 1) * pagesPerGroup + 1;
            let endPage = startPage + pagesPerGroup - 1;
            
            if (endPage > totalPages) endPage = totalPages;

            // [이전 10페이지] 버튼 (<<)
            const prevGroupBtn = document.createElement('a');
            prevGroupBtn.href = '#';
            prevGroupBtn.className = `page-link rounded ${startPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevGroupBtn.innerHTML = '<i class="fas fa-angle-double-left text-[10px]"></i>';
            prevGroupBtn.onclick = (e) => {
                e.preventDefault();
                if (startPage > 1) {
                    currentPage = startPage - 1;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(prevGroupBtn);

            // [이전 1페이지] 화살표 버튼 (<)
            const prevBtn = document.createElement('a');
            prevBtn.href = '#';
            prevBtn.className = `page-link rounded ${currentPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevBtn.innerHTML = '<i class="fas fa-chevron-left text-[10px]"></i>';
            prevBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage > 1) {
                    currentPage--;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(prevBtn);

            // [페이지 번호] 버튼 (10개씩)
            for (let i = startPage; i <= endPage; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }

            // [다음 1페이지] 화살표 버튼 (>)
            const nextBtn = document.createElement('a');
            nextBtn.href = '#';
            nextBtn.className = `page-link rounded ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextBtn.innerHTML = '<i class="fas fa-chevron-right text-[10px]"></i>';
            nextBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(nextBtn);

            // [다음 10페이지] 버튼 (>>)
            const nextGroupBtn = document.createElement('a');
            nextGroupBtn.href = '#';
            nextGroupBtn.className = `page-link rounded ${endPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextGroupBtn.innerHTML = '<i class="fas fa-angle-double-right text-[10px]"></i>';
            nextGroupBtn.onclick = (e) => {
                e.preventDefault();
                if (endPage < totalPages) {
                    currentPage = endPage + 1;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(nextGroupBtn);
        }

        /* * ★ 팝업창 확장자 자동 탐색 로딩 시스템 ★ 
         */
        function openModal(id) {
            const data = bulletinData.find(n => n.id === id);
            if(!data) return;

            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${data.date}`;
            
            const container = document.getElementById('modal-image-container');
            
            Array.from(container.children).forEach(child => {
                if(child.id !== 'loading-msg') child.remove();
            });
            
            const loadingMsg = document.getElementById('loading-msg');
            loadingMsg.style.display = 'flex';
            loadingMsg.innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><span class="mt-2">주보를 불러오는 중입니다...</span>';

            const maxPages = 4; // 보통 주보는 최대 4장까지 검사
            let loadedCount = 0;
            let errorCount = 0;

            function tryLoadModalImage(index, extsArray, wrapElement) {
                if (extsArray.length === 0) {
                    wrapElement.remove(); 
                    errorCount++;
                    if(loadedCount === 0 && errorCount === maxPages) {
                         loadingMsg.innerHTML = '<i class="fas fa-exclamation-circle text-2xl text-gray-400"></i><span class="mt-2">등록된 주보 사진이 없습니다.</span>';
                    }
                    return;
                }

                const currentExt = extsArray.shift();
                
                // 목사님 요청 규격: 01-01, 01-02 등 (번호가 10 미만이어도 01처럼 2자리로)
                let formattedId = id < 10 ? '0' + id : id;
                let numStr = index < 10 ? '0' + index : index;
                
                let imgUrl = `${baseURL}${formattedId}-${numStr}.${currentExt}`;

                let img = document.createElement('img');
                img.className = "w-full h-auto object-contain rounded shadow-sm border border-gray-200 cursor-pointer hover:opacity-90 transition duration-300";
                img.title = "클릭하시면 원본 크기로 확대됩니다.";
                
                // 클릭 시 줌 모달 띄우기
                img.onclick = () => openZoom(imgUrl);
                
                img.onload = function() {
                    wrapElement.classList.remove('hidden'); 
                    loadingMsg.style.display = 'none'; 
                    loadedCount++;
                    wrapElement.appendChild(img);
                    
                    // 돋보기 아이콘 오버레이
                    let zoomIcon = document.createElement('div');
                    zoomIcon.className = "absolute top-4 right-4 bg-black/50 text-white p-2 rounded-full pointer-events-none opacity-70";
                    zoomIcon.innerHTML = '<i class="fas fa-search-plus"></i>';
                    wrapElement.appendChild(zoomIcon);
                };
                
                img.onerror = function() {
                    tryLoadModalImage(index, extsArray, wrapElement);
                };
                
                img.src = imgUrl; 
            }

            for(let i = 1; i <= maxPages; i++) {
                let imgWrap = document.createElement('div');
                imgWrap.className = "bg-white p-1 rounded-lg w-full mb-4 hidden flex flex-col relative"; 
                container.appendChild(imgWrap);
                
                tryLoadModalImage(i, ['jpg', 'png', 'jpeg', 'JPG', 'PNG'], imgWrap);
            }

            const modal = document.getElementById('bulletin-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('bulletin-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        // 확대 모달창 관련 함수
        function openZoom(src) {
            const zoomModal = document.getElementById('zoom-modal');
            const zoomImg = document.getElementById('zoom-image');
            zoomImg.src = src;
            zoomModal.classList.remove('hidden');
            zoomModal.classList.add('flex');
        }

        function closeZoom() {
            const zoomModal = document.getElementById('zoom-modal');
            zoomModal.classList.add('hidden');
            zoomModal.classList.remove('flex');
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
    <script>const ROOT_PATH = "../";</script>
    <script src="../js/common.js"></script>

</body>
