    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmNPl7QMOdRz4v6O0kYga96lCTM8t2xeDwVepsmdUtBfiXyTz4jVmJ_meq0fP0ENusdnKxfHpPjTrJ/pub?gid=1075037635&single=true&output=csv";
        
        let formattedData = [];
        const itemsPerPage = 15; 
        let currentPage = 1;

        // CSV 글씨 분리 함수
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let col, c;
            for (let row = col = c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        async function loadData() {
            try {
                document.getElementById('jubo-list-pc').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>데이터를 불러오는 중입니다...</td></tr>';
                document.getElementById('jubo-list-mobile-body').innerHTML = '<div class="py-10 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>불러오는 중...</div>';

                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                rows.shift(); // 첫 번째 제목 줄 제거

                formattedData = rows.map(row => {
                    return {
                        id: parseInt(row[0] || 0),
                        title: (row[1] || '').trim(),
                        date: (row[2] || '').trim()
                    };
                }).filter(item => item.title !== '' && !isNaN(item.id));

                // 번호가 가장 큰(최신) 순서대로 정렬
                formattedData.sort((a, b) => b.id - a.id);

                renderTable(currentPage);

            } catch (error) {
                console.error("데이터 로딩 에러:", error);
                document.getElementById('jubo-list-pc').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500">데이터를 불러올 수 없습니다. 인터넷 연결을 확인해주세요.</td></tr>';
            }
        }

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = formattedData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('jubo-list-pc');
            const mobileContainer = document.getElementById('jubo-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                // PC Version
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group h-[60px]';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-3 text-gray-400 font-medium">${item.id}</td>
                    <td class="py-3 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition flex items-center">
                        <span class="truncate">${item.title}</span>
                    </td>
                    <td class="py-3 text-[13px] md:text-sm font-medium text-gray-500">${item.date}</td>
                    <td class="py-3">
                        <button class="bg-[#5c5c5c] group-hover:bg-[#1b315b] text-white rounded w-8 h-6 flex items-center justify-center mx-auto transition shadow-sm">
                            <i class="far fa-file-alt text-xs"></i>
                        </button>
                    </td>
                `;
                pcTbody.appendChild(tr);

                // Mobile Version
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-8 relative overflow-hidden">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate flex items-center gap-1.5">
                            <span class="truncate">${item.title}</span>
                        </div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                        <div class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-400"><i class="far fa-file-alt text-lg"></i></div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(formattedData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            if (totalPages === 0) return;

            // 한 번에 보여줄 페이지 번호 개수 (10개)
            const pagesPerGroup = 10;
            const currentGroup = Math.ceil(currentPage / pagesPerGroup);
            let startPage = (currentGroup - 1) * pagesPerGroup + 1;
            let endPage = startPage + pagesPerGroup - 1;
            
            if (endPage > totalPages) endPage = totalPages;

            // [이전] 화살표 버튼
            const prevBtn = document.createElement('a');
            prevBtn.href = '#';
            prevBtn.className = `page-link rounded ${currentPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevBtn.innerHTML = '<i class="fas fa-chevron-left text-xs"></i>';
            prevBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage > 1) {
                    currentPage--;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(prevBtn);

            // [페이지 번호] 버튼 (10개씩)
            for (let i = startPage; i <= endPage; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }

            // [다음] 화살표 버튼
            const nextBtn = document.createElement('a');
            nextBtn.href = '#';
            nextBtn.className = `page-link rounded ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextBtn.innerHTML = '<i class="fas fa-chevron-right text-xs"></i>';
            nextBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(nextBtn);
        }

        // 주보 이미지 동적 로딩 시스템
        function openModal(id) {
            const item = formattedData.find(n => n.id === id);
            if(!item) return;

            // 1. 헤더 세팅
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${item.date}`;
            
            const container = document.getElementById('modal-image-container');
            const downloadBtn = document.getElementById('download-btn');
            downloadBtn.classList.add('hidden'); // 일단 다운로드 버튼 숨김
            downloadBtn.classList.remove('inline-flex');

            // 2. 이전 내용 비우기 및 로딩 표시
            Array.from(container.children).forEach(child => {
                if(child.id !== 'loading-msg') child.remove();
            });
            const loadingMsg = document.getElementById('loading-msg');
            loadingMsg.style.display = 'flex';
            loadingMsg.innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><span class="mt-2">주보를 불러오는 중입니다...</span>';

            // 3. 깃허브 주보 이미지 기본 경로
            const baseURL = "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/news/images/jubo/";
            
            // 제목에서 숫자만 추출 (예: '180826주보' -> '180826')
            const dateId = item.title.replace(/[^0-9]/g, ''); 
            let loadedCount = 0;

            // 4. 단일 페이지(180826.jpg)를 먼저 시도
            let imgSingle = new Image();
            imgSingle.onload = function() {
                appendImage(imgSingle);
                loadingMsg.style.display = 'none';
                setDownload(imgSingle.src, `${dateId}_주보.jpg`);
            };
            imgSingle.onerror = function() {
                // 단일 페이지 실패 시 다중 페이지(180826-1.jpg, 180826-2.jpg...) 시도
                tryMultiPage(1);
            };
            imgSingle.src = `${baseURL}${dateId}.jpg`;

            // 다중 페이지 재귀 로딩 함수
            function tryMultiPage(index) {
                let imgMulti = new Image();
                imgMulti.onload = function() {
                    appendImage(imgMulti);
                    if(index === 1) {
                        loadingMsg.style.display = 'none';
                        setDownload(imgMulti.src, `${dateId}_주보.jpg`);
                    }
                    tryMultiPage(index + 1); // 다음 페이지 시도
                };
                imgMulti.onerror = function() {
                    // 첫 페이지부터 실패한 경우
                    if(index === 1 && loadedCount === 0) {
                        loadingMsg.innerHTML = '<i class="fas fa-exclamation-circle text-2xl text-gray-400"></i><span class="mt-2">등록된 주보 이미지가 없습니다.</span>';
                    }
                };
                imgMulti.src = `${baseURL}${dateId}-${index}.jpg`;
            }

            // 이미지 추가 헬퍼 함수
            function appendImage(imgObj) {
                loadedCount++;
                imgObj.className = "w-full h-auto object-contain shadow-sm border border-gray-200 mb-4 rounded-lg bg-white";
                container.appendChild(imgObj);
            }

            // 다운로드 버튼 세팅 헬퍼 함수
            function setDownload(url, filename) {
                downloadBtn.href = url;
                downloadBtn.setAttribute('download', filename);
                downloadBtn.classList.remove('hidden');
                downloadBtn.classList.add('inline-flex');
            }

            // 모달 열기
            const modal = document.getElementById('jubo-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('jubo-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
