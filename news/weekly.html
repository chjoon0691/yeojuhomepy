    <script>
        
        // 보조 메뉴 여닫기
        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
            }
        }

        // ==========================================
        // ★★★ 구글 스프레드시트 링크 입력 ★★★
        // ==========================================
        const csvUrl = "여기에_링크를_붙여넣으세요"; 
        
        let formattedData = [];
        const itemsPerPage = 15; 
        let currentPage = 1;

        // 깃허브 이미지 주소 기본 경로
        const baseURL = "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/news/images/jubo/";

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let col, c;
            for (let row = col = c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        async function loadData() {
            if (csvUrl === "여기에_링크를_붙여넣으세요" || csvUrl === "") {
                document.getElementById('bulletin-list-pc').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500 font-bold"><i class="fas fa-exclamation-triangle mr-2"></i>웹 관리자에게 주보 엑셀 링크(CSV) 연결을 요청해주세요.</td></tr>';
                document.getElementById('bulletin-list-mobile-body').innerHTML = '<div class="py-10 text-center text-red-500 font-bold text-sm">엑셀 링크(CSV) 연결이 필요합니다.</div>';
                return;
            }

            try {
                document.getElementById('bulletin-list-pc').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>데이터를 불러오는 중입니다...</td></tr>';
                document.getElementById('bulletin-list-mobile-body').innerHTML = '<div class="py-10 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>불러오는 중...</div>';

                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                const rows = parseCSV(csvText);
                rows.shift(); // 제목 줄 제거

                formattedData = rows.map(row => {
                    return {
                        id: parseInt(row[0] || 0),
                        title: (row[1] || '').trim(), 
                        date: (row[2] || '').trim()
                    };
                }).filter(item => item.title !== '' && !isNaN(item.id));

                formattedData.sort((a, b) => b.id - a.id);

                renderTable(currentPage);

            } catch (error) {
                console.error("데이터 로딩 에러:", error);
                document.getElementById('bulletin-list-pc').innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500">데이터를 불러올 수 없습니다. 인터넷 연결을 확인해주세요.</td></tr>';
            }
        }

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = formattedData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('bulletin-list-pc');
            const mobileContainer = document.getElementById('bulletin-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                // PC Version
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-4 text-gray-400 font-medium">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition flex items-center gap-2">
                        <span class="truncate">${item.title}</span>
                    </td>
                    <td class="py-4 text-sm text-gray-500">${item.date}</td>
                    <td class="py-4">
                        <button class="bg-[#5c5c5c] hover:bg-[#1b315b] text-white rounded px-3 py-1.5 text-xs font-bold transition flex items-center justify-center mx-auto gap-1 shadow-sm">
                            <i class="far fa-window-restore"></i> 보기
                        </button>
                    </td>
                `;
                pcTbody.appendChild(tr);

                // Mobile Version
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-2 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate">${item.title}</div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                    </div>
                    <div class="w-16 text-center shrink-0">
                        <button class="bg-gray-100 text-gray-500 rounded px-2 py-1 text-xs border border-gray-300">보기</button>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(formattedData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        function openModal(id) {
            const item = formattedData.find(n => n.id === id);
            if(!item) return;

            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${item.date}`;
            
            const container = document.getElementById('modal-image-container');
            container.innerHTML = ''; // 기존 이미지 초기화
            
            document.getElementById('loading-msg').style.display = 'flex';
            
            const downloadBtn = document.getElementById('modal-download-btn');
            downloadBtn.href = "#";
            downloadBtn.removeAttribute("download");
            
            // 제목에서 숫자만 추출 (예: "180826주보" -> "180826")
            const fileBaseName = item.title.replace(/[^0-9]/g, '').substring(0, 6);
            
            let loadedCount = 0;

            // 순차적 파일 탐색기 (단일 파일 or 다중 페이지 지원)
            function tryLoad(suffix, exts, isMulti) {
                if(exts.length === 0) {
                    if(!isMulti && suffix === '') {
                        // 단일 파일이 없으면 다중 파일(-1, -2...) 첫 번째 페이지 시도
                        tryLoad('-1', ['jpg', 'png', 'jpeg', 'JPG', 'PNG'], true);
                    } else if (isMulti && loadedCount === 0 && suffix === '-1') {
                         // -1도 없고 로드된 게 전혀 없으면 에러 메시지 출력
                         document.getElementById('loading-msg').innerHTML = '<i class="fas fa-exclamation-circle text-2xl text-gray-400"></i><span class="text-sm">등록된 주보 파일이 없습니다.</span>';
                    }
                    return;
                }
                
                const ext = exts.shift();
                const imgUrl = `${baseURL}${fileBaseName}${suffix}.${ext}`;
                const img = new Image();
                
                img.onload = () => {
                    document.getElementById('loading-msg').style.display = 'none';
                    
                    const imgEl = document.createElement('img');
                    imgEl.src = imgUrl;
                    imgEl.className = "w-full max-w-3xl h-auto object-contain rounded-lg shadow-sm border border-gray-200 bg-white p-1";
                    container.appendChild(imgEl);
                    
                    loadedCount++;
                    
                    // 다운로드 버튼 설정 (첫 번째 이미지만 다운로드 링크로 연결)
                    if(loadedCount === 1) {
                        downloadBtn.href = imgUrl;
                        downloadBtn.setAttribute("download", `${item.title}.${ext}`);
                    }
                    
                    // 다중 파일 모드일 경우 다음 페이지(-2, -3...) 계속 시도
                    if(isMulti) {
                        const nextNum = parseInt(suffix.replace('-', '')) + 1;
                        tryLoad('-' + nextNum, ['jpg', 'png', 'jpeg', 'JPG', 'PNG'], true);
                    }
                };
                
                img.onerror = () => {
                    // 실패 시 다음 확장자 시도
                    tryLoad(suffix, exts, isMulti);
                };
                
                img.src = imgUrl;
            }

            // 첫 번째 시도: 단일 파일(예: 180826.jpg)부터 검색 시작
            tryLoad('', ['jpg', 'png', 'jpeg', 'JPG', 'PNG'], false);

            const modal = document.getElementById('bulletin-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('bulletin-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
