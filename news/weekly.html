    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->
    <div id="common-footer"></div>
    <div id="common-sitemap"></div>

    <script>
        // 보조 메뉴 여닫기 (현재 페이지용)
        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        // --- 게시판 데이터 및 기능 (이전과 동일) ---
        const bulletinData = [
            { id: 416, title: "260607 주보(1)", date: "2026.06.05", imageUrl: "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/images/image_4fc25e.png" },
            { id: 415, title: "260531 주보(1)", date: "2026.05.29", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260531+%EC%A3%BC%EB%B3%B4" },
            { id: 414, title: "260524 주보", date: "2026.05.22", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260524+%EC%A3%BC%EB%B3%B4" },
            { id: 413, title: "260517 주보", date: "2026.05.15", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260517+%EC%A3%BC%EB%B3%B4" },
            { id: 412, title: "260510 주보", date: "2026.05.08", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260510+%EC%A3%BC%EB%B3%B4" },
            { id: 411, title: "260503 주보", date: "2026.04.30", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260503+%EC%A3%BC%EB%B3%B4" },
            { id: 410, title: "260426 주보", date: "2026.04.24", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260426+%EC%A3%BC%EB%B3%B4" },
            { id: 409, title: "260419 주보", date: "2026.04.17", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260419+%EC%A3%BC%EB%B3%B4" },
            { id: 408, title: "260412 주보", date: "2026.04.10", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260412+%EC%A3%BC%EB%B3%B4" },
            { id: 407, title: "260405 주보", date: "2026.04.03", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260405+%EC%A3%BC%EB%B3%B4" },
            { id: 406, title: "260329 주보", date: "2026.03.27", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260329+%EC%A3%BC%EB%B3%B4" },
            { id: 405, title: "260322 주보", date: "2026.03.20", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260322+%EC%A3%BC%EB%B3%B4" },
            { id: 404, title: "260315 주보", date: "2026.03.13", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260315+%EC%A3%BC%EB%B3%B4" },
            { id: 403, title: "260308 주보", date: "2026.03.06", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260308+%EC%A3%BC%EB%B3%B4" },
            { id: 402, title: "260222 주보", date: "2026.02.20", imageUrl: "https://dummyimage.com/1200x800/eeeeee/333333.png&text=260222+%EC%A3%BC%EB%B3%B4" }
        ];

        const itemsPerPage = 15; 
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = bulletinData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('bulletin-list-pc');
            const mobileContainer = document.getElementById('bulletin-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition flex items-center">
                        <span class="truncate max-w-[90%]">${item.title}</span>
                        <i class="far fa-image text-gray-400 ml-2 text-sm"></i>
                    </td>
                    <td class="py-4 text-sm font-medium text-gray-500">${item.date}</td>
                `;
                pcTbody.appendChild(tr);

                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate flex items-center gap-1.5">
                            <span class="truncate">${item.title}</span>
                            <i class="far fa-image text-gray-400 text-xs"></i>
                        </div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(bulletinData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        function openModal(id) {
            const item = bulletinData.find(n => n.id === id);
            if(!item) return;

            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${item.date}`;
            
            const imageEl = document.getElementById('modal-image');
            imageEl.src = item.imageUrl;
            
            const downloadBtn = document.getElementById('modal-download-btn');
            downloadBtn.href = item.imageUrl;

            const modal = document.getElementById('bulletin-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('bulletin-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
