        const galleryData = rawText.trim().split('\n')
            .filter(line => line.trim() !== '' && line.includes('|'))
            .map(line => {
                const parts = line.split('|');
                return {
                    id: parseInt(parts[0].trim()),
                    title: parts[1] ? parts[1].trim() : '',
                    date: parts[2] ? parts[2].trim() : ''
                };
            }).filter(item => !isNaN(item.id));

        // 총 앨범 수 자동 표시
        document.getElementById('total-count').textContent = galleryData.length;

        // 2. 깃허브 사진 저장소 기본 주소
        const baseURL = "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/news/images/newcomer/";

        // ★ 사진이 없는 성도 번호 리스트 ★
        const noImageIds = [374, 372, 368, 290, 270, 269, 242, 233, 116];

        const itemsPerPage = 15; // 한 페이지당 15명씩 출력
        let currentPage = 1;

        // ★ 확장자 자동 탐색하여 썸네일 로딩하는 함수 ★
        function loadThumbnail(imgElement, id) {
            // 사진이 없는 번호는 아이콘을 띄우지 않음
            if (noImageIds.includes(id)) {
                return;
            }

            const exts = ['jpg', 'png', 'jpeg', 'JPG', 'PNG'];
            let extIndex = 0;
            // 파일명 규칙: 1~9는 01~09, 10 이상은 그대로 10, 11... 389
            let fileName = id < 10 ? '0' + id : id;

            function tryNext() {
                if (extIndex >= exts.length) {
                    return;
                }
                imgElement.src = `${baseURL}${fileName}.${exts[extIndex]}`;
                extIndex++;
            }

            imgElement.onerror = tryNext;
            
            imgElement.onload = function() {
                const iconId = `icon-${id}`;
                const iconElement = document.getElementById(iconId);
                const iconElementMobile = document.getElementById(`icon-m-${id}`);
                if (iconElement) iconElement.classList.remove('hidden');
                if (iconElementMobile) iconElementMobile.classList.remove('hidden');
            };
            
            tryNext(); 
        }

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = galleryData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('newcomer-list-pc');
            const mobileContainer = document.getElementById('newcomer-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                // PC Version
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition flex items-center">
                        <span class="truncate max-w-[90%]">${item.title}</span>
                        <i id="icon-${item.id}" class="far fa-image text-gray-400 ml-2 text-sm hidden"></i>
                    </td>
                    <td class="py-4 text-sm font-medium text-gray-500">${item.date}</td>
                `;
                pcTbody.appendChild(tr);

                // Mobile Version
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 flex items-center gap-1.5">
                            <span class="truncate">${item.title}</span>
                            <i id="icon-m-${item.id}" class="far fa-image text-gray-400 text-[10px] hidden shrink-0 mt-0.5"></i>
                        </div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);

                // 이미지 존재 여부 백그라운드 체크
                const dummyImg = new Image();
                loadThumbnail(dummyImg, item.id);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(galleryData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            if (totalPages === 0) return;

            // 한 번에 보여줄 페이지 번호 개수 (10개)
            const pagesPerGroup = 10;
            const currentGroup = Math.ceil(currentPage / pagesPerGroup);
            let startPage = (currentGroup - 1) * pagesPerGroup + 1;
            let endPage = startPage + pagesPerGroup - 1;
            
            if (endPage > totalPages) endPage = totalPages;

            // [이전 10페이지] 버튼 (<<)
            const prevGroupBtn = document.createElement('a');
            prevGroupBtn.href = '#';
            prevGroupBtn.className = `page-link rounded ${startPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevGroupBtn.innerHTML = '<i class="fas fa-angle-double-left text-[10px]"></i>';
            prevGroupBtn.onclick = (e) => {
                e.preventDefault();
                if (startPage > 1) {
                    currentPage = startPage - 1;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(prevGroupBtn);

            // [이전 1페이지] 화살표 버튼 (<)
            const prevBtn = document.createElement('a');
            prevBtn.href = '#';
            prevBtn.className = `page-link rounded ${currentPage === 1 ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            prevBtn.innerHTML = '<i class="fas fa-chevron-left text-[10px]"></i>';
            prevBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage > 1) {
                    currentPage--;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(prevBtn);

            // [페이지 번호] 버튼 (10개씩)
            for (let i = startPage; i <= endPage; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }

            // [다음 1페이지] 화살표 버튼 (>)
            const nextBtn = document.createElement('a');
            nextBtn.href = '#';
            nextBtn.className = `page-link rounded ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextBtn.innerHTML = '<i class="fas fa-chevron-right text-[10px]"></i>';
            nextBtn.onclick = (e) => {
                e.preventDefault();
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(nextBtn);

            // [다음 10페이지] 버튼 (>>)
            const nextGroupBtn = document.createElement('a');
            nextGroupBtn.href = '#';
            nextGroupBtn.className = `page-link rounded ${endPage === totalPages ? 'opacity-30 cursor-not-allowed pointer-events-none' : ''}`;
            nextGroupBtn.innerHTML = '<i class="fas fa-angle-double-right text-[10px]"></i>';
            nextGroupBtn.onclick = (e) => {
                e.preventDefault();
                if (endPage < totalPages) {
                    currentPage = endPage + 1;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                }
            };
            paginationContainer.appendChild(nextGroupBtn);
        }

        /* * ★ 팝업창 확장자 자동 탐색 로딩 시스템 ★ 
         */
        function openModal(id) {
            const data = galleryData.find(n => n.id === id);
            if(!data) return;

            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${data.date}`;
            
            const container = document.getElementById('modal-image-container');
            
            Array.from(container.children).forEach(child => {
                if(child.id !== 'loading-msg') child.remove();
            });
            
            const loadingMsg = document.getElementById('loading-msg');

            // ★ 사진 없는 번호 처리 로직 ★
            if (noImageIds.includes(id)) {
                loadingMsg.style.display = 'none';
                
                let noImgWrap = document.createElement('div');
                noImgWrap.className = "flex flex-col items-center justify-center py-16 w-full";
                noImgWrap.innerHTML = `
                    <img src="../images/교회마크만01.png" alt="교회 마크" class="w-24 h-24 object-contain mb-4 opacity-30">
                    <span class="text-xl font-bold text-gray-400">NO IMAGE</span>
                `;
                container.appendChild(noImgWrap);
            } else {
                loadingMsg.style.display = 'flex';
                loadingMsg.innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><span>사진을 불러오는 중입니다...</span>';

                let fileName = id < 10 ? '0' + id : id;
                let imgWrap = document.createElement('div');
                imgWrap.className = "bg-white p-2 md:p-3 rounded-lg shadow-sm border border-gray-200 w-full mb-4 hidden"; 
                container.appendChild(imgWrap);

                let exts = ['jpg', 'png', 'jpeg', 'JPG', 'PNG'];
                
                function tryLoad(extIndex) {
                    if(extIndex >= exts.length) {
                        imgWrap.remove();
                        loadingMsg.innerHTML = '<i class="fas fa-exclamation-circle text-2xl text-gray-400"></i><span>등록된 사진이 없습니다.</span>';
                        return;
                    }
                    
                    // 파일명을 리스트 번호와 동일하게 연결
                    let imgUrl = `${baseURL}${fileName}.${exts[extIndex]}`;
                    let img = document.createElement('img');
                    img.className = "w-full h-auto object-contain rounded";
                    
                    img.onload = function() {
                        imgWrap.classList.remove('hidden');
                        loadingMsg.style.display = 'none';
                        imgWrap.appendChild(img);
                    };
                    
                    img.onerror = function() {
                        tryLoad(extIndex + 1);
                    };
                    
                    img.src = imgUrl;
                }
                
                tryLoad(0);
            }

            const modal = document.getElementById('newcomer-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('newcomer-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
