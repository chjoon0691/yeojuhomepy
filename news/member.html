            { id: 278, title: "결혼 - 서은정양(이미화 권사 장녀)", date: "2026.05.16", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 277, title: "장례 - 김흥식 성도", date: "2026.05.16", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 276, title: "선거사무소 개소 - 이충우집사(강정옥집사)·조장연성도(서주영집사)·최근...", date: "2026.05.09", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 275, title: "사업장 이전 오픈 - 장태동·이아름집사 \"스카이우드\" 여주시 장여로 1497", date: "2026.05.09", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 274, title: "개업 - 이현석·김민진집사 \"CUP&CUP\" 가남읍 태평로 24-1 (가남 이디야...", date: "2026.05.09", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 273, title: "장례 - 최금용권사 (길동배권사 모친, 조규순권사 시모)", date: "2026.04.26", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 272, title: "개업 - 류주희·박재범집사 \"한별반려견미용실\" (삼한아파트 입구, 목...", date: "2026.04.24", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 271, title: "결혼 - 최승부목사(윤향열권사 장남)", date: "2026.04.24", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 270, title: "장례 - 백승훈 집사 빙모상", date: "2026.04.24", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" },
            { id: 269, title: "결혼 - 안수진양(안제황성도 장녀)", date: "2026.04.18", imageUrl: "https://dummyimage.com/800x400/eeeeee/333333.png&text=상세+이미지+준비중" }
        ];

        const itemsPerPage = 15; 
        let currentPage = 1;

        function renderTable(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = memberData.slice(startIndex, endIndex);

            const pcTbody = document.getElementById('member-list-pc');
            const mobileContainer = document.getElementById('member-list-mobile-body');

            pcTbody.innerHTML = '';
            mobileContainer.innerHTML = '';

            pageData.forEach(item => {
                // PC Version
                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-200 hover:bg-gray-50 transition cursor-pointer group';
                tr.onclick = () => openModal(item.id);
                
                tr.innerHTML = `
                    <td class="py-4 text-gray-400">${item.id}</td>
                    <td class="py-4 px-4 text-left font-bold text-gray-800 group-hover:text-[#3b82f6] transition flex items-center">
                        <span class="truncate max-w-[90%]">${item.title}</span>
                    </td>
                    <td class="py-4 text-sm font-medium text-gray-500">${item.date}</td>
                `;
                pcTbody.appendChild(tr);

                // Mobile Version
                const mDiv = document.createElement('div');
                mDiv.className = 'flex border-b border-gray-200 py-3.5 hover:bg-gray-50 transition cursor-pointer items-center';
                mDiv.onclick = () => openModal(item.id);
                mDiv.innerHTML = `
                    <div class="w-16 text-center text-gray-400 text-sm font-medium shrink-0">${item.id}</div>
                    <div class="flex-1 pl-2 pr-4 relative">
                        <div class="text-gray-800 text-[15px] font-bold mb-0.5 truncate flex items-center gap-1.5">
                            <span class="truncate">${item.title}</span>
                        </div>
                        <div class="text-gray-500 text-[12px] font-medium">${item.date}</div>
                    </div>
                `;
                mobileContainer.appendChild(mDiv);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(memberData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderTable(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        function openModal(id) {
            const item = memberData.find(n => n.id === id);
            if(!item) return;

            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${item.date}`;
            
            const imageEl = document.getElementById('modal-image');
            imageEl.src = item.imageUrl;

            const modal = document.getElementById('member-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('member-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(currentPage);
        });
    </script>
