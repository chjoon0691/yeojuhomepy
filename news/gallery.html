    <!-- 마법의 파일 연결 2: 공통 하단 푸터 & 사이트맵 -->

    <div id="common-sitemap"></div>

    <script>
        // 갤러리 데이터
        const galleryData = [
            { id: 251, title: "20260531 어와나 야외예배 ...", imageUrl: "https://images.unsplash.com/photo-1544640808-32ca72ac7f37?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 250, title: "20260531 청년부친구초청...", imageUrl: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 249, title: "20260524 고등부 야외예배", imageUrl: "https://images.unsplash.com/photo-1526976663112-00508a8f7c9e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 248, title: "20260523 11,12교구 산상...", imageUrl: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 247, title: "20260523 부모교육세미나", imageUrl: "https://images.unsplash.com/photo-1521737852567-6949f3f9f2b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 246, title: "20260517 청년부 야외예배", imageUrl: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 245, title: "20260517 교사헌신예배", imageUrl: "https://images.unsplash.com/photo-1438283173091-5dbf5c5a3206?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 244, title: "20260510 온가족초청예배 (2)", imageUrl: "https://images.unsplash.com/photo-1509062522246-3755977927d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 243, title: "20260510 온가족초청예배 (1)", imageUrl: "https://images.unsplash.com/photo-1509062522246-3755977927d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 242, title: "20260509 5,6교구 산상기...", imageUrl: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 241, title: "20260503 유아세례식", imageUrl: "https://images.unsplash.com/photo-1555252333-9f8e92e65df9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 240, title: "20260502 7,8교구 산상기...", imageUrl: "https://images.unsplash.com/photo-1529070538774-1843cb3265df?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 239, title: "20260426 소망교도소 예배", imageUrl: "https://images.unsplash.com/photo-1438283173091-5dbf5c5a3206?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 238, title: "20260423 남여전도회 주관 ...", imageUrl: "https://images.unsplash.com/photo-1551632811-561732d1e306?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { id: 237, title: "20260422 마더와이즈 수료식", imageUrl: "https://images.unsplash.com/photo-1521737852567-6949f3f9f2b5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
        ];

        const itemsPerPage = 12; // 갤러리는 그리드 형태라 12개로 맞춤
        let currentPage = 1;

        function renderGallery(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = galleryData.slice(startIndex, endIndex);

            const gridContainer = document.getElementById('gallery-grid');
            gridContainer.innerHTML = '';

            pageData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'flex flex-col cursor-pointer group';
                card.onclick = () => openModal(item.id);
                
                card.innerHTML = `
                    <div class="w-full aspect-[4/3] rounded-lg overflow-hidden shadow-sm border border-gray-200 mb-2 relative">
                        <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition duration-300"></div>
                    </div>
                    <p class="text-sm font-bold text-gray-800 text-center truncate px-1 group-hover:text-[#3b82f6] transition">${item.title}</p>
                `;
                gridContainer.appendChild(card);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(galleryData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderGallery(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        function openModal(id) {
            const item = galleryData.find(n => n.id === id);
            if(!item) return;

            document.getElementById('modal-title').textContent = item.title;
            const imageEl = document.getElementById('modal-image');
            imageEl.src = item.imageUrl;

            const downloadBtn = document.getElementById('modal-download-btn');
            downloadBtn.href = item.imageUrl;

            const modal = document.getElementById('gallery-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('gallery-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderGallery(currentPage);
        });
    </script>
