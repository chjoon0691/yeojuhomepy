        // 데이터 변환 및 날짜 축약 규칙 적용 (2026 -> 26)
        const galleryData = rawText.trim().split('\n').filter(line => line.trim() !== '').map(line => {
            const parts = line.split('|');
            let originalTitle = parts[1].trim();
            // 제목이 202X로 시작하면 2X로 변경하는 마법의 규칙
            let shortTitle = originalTitle.replace(/^20([2-9][0-9])/, '$1');
            
            return {
                id: parseInt(parts[0].trim()),
                title: shortTitle,
                date: parts[2].trim()
            };
        });

        // 총 앨범 수 자동 표시
        document.getElementById('total-count').textContent = galleryData.length;

        // 2. 깃허브 사진 저장소 기본 주소 (이 폴더에 올리시면 됩니다)
        const baseURL = "https://raw.githubusercontent.com/chjoon0691/yeojuhomepy/main/news/images/gallery/";

        const itemsPerPage = 12; 
        let currentPage = 1;

        // ★ 확장자 자동 탐색하여 썸네일 로딩하는 함수 ★
        function loadThumbnail(imgElement, id) {
            const exts = ['jpg', 'png', 'jpeg', 'JPG', 'PNG'];
            let extIndex = 0;

            function tryNext() {
                if (extIndex >= exts.length) {
                    imgElement.src = `https://placehold.co/800x600/f3f4f6/9ca3af?text=${id}`; // 모두 실패시 기본 회색 이미지
                    return;
                }
                imgElement.src = `${baseURL}${id}-01.${exts[extIndex]}`;
                extIndex++;
            }

            imgElement.onerror = tryNext;
            tryNext(); // 첫 번째 시도 시작
        }

        function renderGallery(page) {
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = galleryData.slice(startIndex, endIndex);

            const gridContainer = document.getElementById('gallery-grid');
            gridContainer.innerHTML = '';

            pageData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'flex flex-col cursor-pointer group';
                card.onclick = () => openModal(item.id);

                let imgId = `thumb-${item.id}`;
                
                card.innerHTML = `
                    <div class="w-full aspect-[4/3] rounded-lg overflow-hidden shadow-sm border border-gray-200 mb-2 relative bg-gray-50">
                        <img id="${imgId}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition duration-300"></div>
                        
                        <!-- ★ 마우스 호버 시 왼쪽 위에 나타나는 번호 배지 ★ -->
                        <div class="absolute top-2 left-2 bg-[#1b315b]/90 text-white text-xs font-bold px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity duration-300 backdrop-blur-sm z-10 shadow">
                            No.${item.id}
                        </div>

                        <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-2 py-0.5 rounded flex items-center gap-1">
                            <i class="far fa-images"></i>
                        </div>
                    </div>
                    <p class="text-sm font-bold text-gray-800 text-center truncate px-1 group-hover:text-[#3b82f6] transition">${item.title}</p>
                `;
                gridContainer.appendChild(card);
                
                // 생성 직후 썸네일 로딩 시도
                loadThumbnail(document.getElementById(imgId), item.id);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(galleryData.length / itemsPerPage);
            const paginationContainer = document.getElementById('pagination');
            paginationContainer.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const a = document.createElement('a');
                a.href = '#';
                a.className = `page-link ${i === currentPage ? 'active' : ''} rounded`;
                a.textContent = i;
                a.onclick = (e) => {
                    e.preventDefault();
                    currentPage = i;
                    renderGallery(currentPage);
                    window.scrollTo({top: 300, behavior: 'smooth'}); 
                };
                paginationContainer.appendChild(a);
            }
        }

        /* * ★ 팝업창 확장자 자동 탐색 로딩 시스템 ★ 
         */
        function openModal(id) {
            const data = galleryData.find(n => n.id === id);
            if(!data) return;

            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-date').innerHTML = `<i class="far fa-calendar-alt mr-1"></i> 등록일 : ${data.date}`;
            
            const container = document.getElementById('modal-image-container');
            
            Array.from(container.children).forEach(child => {
                if(child.id !== 'loading-msg') child.remove();
            });
            document.getElementById('loading-msg').style.display = 'flex';
            document.getElementById('loading-msg').innerHTML = '<i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><span>사진을 불러오는 중입니다...</span>';

            const maxImages = 30; // 앨범당 최대 30장 검사
            let loadedCount = 0;
            let errorCount = 0;

            // 순차적으로 이미지 존재 여부를 확인하고 로드하는 재귀 함수
            function tryLoadModalImage(index, extsArray, wrapElement) {
                if (extsArray.length === 0) {
                    wrapElement.remove(); // 모든 확장자 실패 시 요소 삭제
                    errorCount++;
                    if(loadedCount === 0 && errorCount === maxImages) {
                         document.getElementById('loading-msg').innerHTML = '<i class="fas fa-exclamation-circle text-2xl text-gray-400"></i><span>등록된 사진이 없습니다.</span>';
                    }
                    return;
                }

                const currentExt = extsArray.shift();
                let numStr = index < 10 ? '0' + index : index;
                let imgUrl = `${baseURL}${id}-${numStr}.${currentExt}`;

                let img = document.createElement('img');
                img.className = "w-full h-auto object-contain rounded";
                
                img.onload = function() {
                    wrapElement.classList.remove('hidden'); 
                    document.getElementById('loading-msg').style.display = 'none'; 
                    loadedCount++;
                    wrapElement.appendChild(img);
                };
                
                img.onerror = function() {
                    // 실패 시 다음 확장자 시도
                    tryLoadModalImage(index, extsArray, wrapElement);
                };
                
                img.src = imgUrl; 
            }

            for(let i = 1; i <= maxImages; i++) {
                let imgWrap = document.createElement('div');
                imgWrap.className = "bg-white p-2 md:p-3 rounded-lg shadow-sm border border-gray-200 w-full mb-4 hidden"; 
                container.appendChild(imgWrap);
                
                // jpg, png, jpeg 순서로 시도하도록 배열 복사
                tryLoadModalImage(i, ['jpg', 'png', 'jpeg', 'JPG', 'PNG'], imgWrap);
            }

            const modal = document.getElementById('gallery-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('gallery-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        }

        function toggleMobileSubMenu(menuId) {
            const targetMenu = document.getElementById(menuId);
            const otherMenuId = menuId === 'menu-depth1' ? 'menu-depth2' : 'menu-depth1';
            const otherMenu = document.getElementById(otherMenuId);
            if (otherMenu && !otherMenu.classList.contains('hidden')) {
                otherMenu.classList.add('hidden');
                const otherIcon = otherMenu.previousElementSibling.querySelector('.fas');
                if(otherIcon) {
                    otherIcon.classList.remove('fa-minus');
                    otherIcon.classList.add('fa-plus');
                }
            }
            if (targetMenu) {
                targetMenu.classList.toggle('hidden');
                const icon = targetMenu.previousElementSibling.querySelector('.fas');
                if(icon) {
                    if(targetMenu.classList.contains('hidden')) {
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    } else {
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderGallery(currentPage);
        });
    </script>
